name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  DATABASE_URL: postgresql://shashvat:shashvat_dev@localhost:5432/shashvat_dev
  TEST_DATABASE_URL: postgresql://shashvat:shashvat_dev@localhost:5432/shashvat_test
  JWT_SECRET: ci-test-secret-key-do-not-use-in-prod
  MINIO_ENDPOINT: localhost
  MINIO_PORT: '9000'
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  MINIO_BUCKET: shashvat-media
  NEXT_PUBLIC_API_URL: http://localhost:4000

jobs:
  typecheck-lint-unit:
    name: Typecheck + lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm approve-builds --all
        continue-on-error: true

      - run: pnpm -r typecheck

      - run: pnpm --filter api test:unit
      - run: pnpm --filter web test

  integration:
    name: API integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shashvat
          POSTGRES_PASSWORD: shashvat_dev
          POSTGRES_DB: shashvat_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm approve-builds --all
        continue-on-error: true

      - run: psql -h localhost -U shashvat -d postgres -c "CREATE DATABASE shashvat_test;"
        env:
          PGPASSWORD: shashvat_dev

      - run: pnpm --filter api db:push

      - run: pnpm --filter api test:int

  web:
    name: Web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm approve-builds --all
        continue-on-error: true

      - run: pnpm --filter web test
